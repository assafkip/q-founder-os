name: x-own-posts
schema_version: 1
method: apify
apify:
  actor_id: apidojo/tweet-scraper
  input:
    searchTerms:
      - "from:${TWITTER_HANDLE}"
    maxTweets: 50
schedule:
  frequency: daily
  skip_if_hours: 20
output:
  full_text: true
incremental:
  cursor_field: timestamp
  state_key: x-own-posts
persist:
  method: kipi_insert_content_metrics
on_error: skip
