# Machine-readable cadence config. Source of truth for Python verification scripts.
# Human-readable version: _cadence-config.md (agents read that, scripts read this)

posting:
  linkedin:
    min: 3
    max: 5
    unit: week
    peak_days: [tue, wed, thu]
  x:
    min: 3
    max: 5
    unit: day
    note: "incl replies/quotes"
  reddit:
    min: 1
    max: 1
    unit: week
    subreddits: []  # configure per project
  medium:
    min: 1
    max: 1
    unit: month

outreach:
  initial: {day: 0}
  followup_1: {day: 3}
  followup_2: {day: 7}
  followup_3: {day: 14}
  breakup: {day: 21}

limits:
  linkedin_cr_daily: 15
  linkedin_cr_weekly: 80
  value_drop_cooldown_days: 5
  max_daily_hitlist_actions: 15
  dm_followup_timeout_days: 14
  auto_close_days: 21

engagement:
  comments_per_prospect_weekly: 1
  comments_daily_total:
    min: 5
    max: 10
  new_cr_daily:
    min: 10
    max: 15
